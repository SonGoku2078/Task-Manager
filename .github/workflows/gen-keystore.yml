name: Generate signing keystore (one-time)

# Run manually ONCE (Actions → this workflow → Run). Produces a stable keystore;
# download the artifact and store its base64 as the ANDROID_KEYSTORE_B64 secret.
on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore selfmanaged.keystore \
            -alias selfmanaged \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass smkeystore2026 -keypass smkeystore2026 \
            -dname "CN=SelfManaged Mobile, OU=Dev, O=SelfManaged, L=NA, ST=NA, C=CH"
          base64 -w0 selfmanaged.keystore > keystore.b64

      - uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: keystore.b64
