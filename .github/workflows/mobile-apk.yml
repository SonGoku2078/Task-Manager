name: Mobile APK

# Build a sideloadable, stably-signed Android APK from the Capacitor mobile app.
# Trigger: push a tag like `mobile-v0.2.0` (attaches the APK to a Release),
# or run manually via the Actions UI (uploads the APK as a run artifact).
on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app (bake version)
        run: npm run build:mobile
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Sync Capacitor (copy web assets into the Android project)
        run: npx cap sync android
        working-directory: apps/mobile

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > apps/mobile/android/app/selfmanaged.keystore

      - name: Build signed release APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -PversionName=${{ github.ref_name }} \
            -PversionCode=${{ github.run_number }}

      - name: Attach APK to the Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: apps/mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload APK artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
