name: Mobile APK

# Build a sideloadable Android APK from the Capacitor mobile app.
# Trigger: push a tag like `mobile-v0.1.0` (attaches the APK to a Release),
# or run manually via the Actions UI (uploads the APK as a run artifact).
on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build:mobile

      - name: Sync Capacitor (copy web assets into the Android project)
        run: npx cap sync android
        working-directory: apps/mobile

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Attach APK to the Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
