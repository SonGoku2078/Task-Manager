name: Release (retired - prod is released locally)

# RETIRED: production is now released LOCALLY via `npm run release`
# (scripts/release.ps1) = build + Freigabe + restart of the local prod server.
# This workflow no longer runs on `v*` tags, so pushing a version tag does NOT
# trigger the old approval gate anymore. It stays as a MANUAL-ONLY fallback that
# still builds the portable prod bundle (zip) + waits on the `production`
# environment approval — handy only if you ever deploy to a DIFFERENT machine.
# Start it from the Actions tab -> this workflow -> "Run workflow".
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1) Always builds the prod bundle and uploads it as a pipeline artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Build (frontend + server)
        run: npm run build

      - name: Assemble production bundle
        run: |
          mkdir -p bundle/server
          cp -r server/dist bundle/server/dist
          cp -r server/public bundle/server/public
          cp server/package.json bundle/server/package.json
          cat > bundle/START-PROD.cmd <<'EOF'
          @echo off
          cd /d "%~dp0server"
          if not exist node_modules ( call npm install --omit=dev )
          set DB_FILE=data.db
          set PORT=3001
          node dist/index.js
          EOF
          cat > bundle/README.txt <<'EOF'
          SelfManaged - Production bundle
          1. Double-click START-PROD.cmd (installs deps on first run).
          2. Open http://localhost:3001 in your browser.
          Data lives in %USERPROFILE%\.task-manager\data.db
          EOF
          cd bundle && zip -r ../selfmanaged-${{ github.ref_name }}.zip .

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-bundle
          path: selfmanaged-${{ github.ref_name }}.zip

  # 2) Publishes the GitHub Release — gated by the `production` environment, which
  #    requires the user's manual approval in the Actions UI before it runs.
  publish-production:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: prod-bundle

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: selfmanaged-${{ github.ref_name }}.zip
