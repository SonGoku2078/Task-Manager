name: Release

# "Going to production" = push a version tag (e.g. v0.1.0). The app is built,
# then the production release WAITS for manual approval (the `production`
# environment has a required reviewer). Nothing reaches prod without that OK.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 1) Always builds the prod bundle and uploads it as a pipeline artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Build (frontend + server)
        run: npm run build

      - name: Assemble production bundle
        run: |
          mkdir -p bundle/server
          cp -r server/dist bundle/server/dist
          cp -r server/public bundle/server/public
          cp server/package.json bundle/server/package.json
          cat > bundle/START-PROD.cmd <<'EOF'
          @echo off
          cd /d "%~dp0server"
          if not exist node_modules ( call npm install --omit=dev )
          set DB_FILE=data.db
          set PORT=3001
          node dist/index.js
          EOF
          cat > bundle/README.txt <<'EOF'
          SelfManaged - Production bundle
          1. Double-click START-PROD.cmd (installs deps on first run).
          2. Open http://localhost:3001 in your browser.
          Data lives in %USERPROFILE%\.task-manager\data.db
          EOF
          cd bundle && zip -r ../selfmanaged-${{ github.ref_name }}.zip .

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-bundle
          path: selfmanaged-${{ github.ref_name }}.zip

  # 2) Publishes the GitHub Release — gated by the `production` environment, which
  #    requires the user's manual approval in the Actions UI before it runs.
  publish-production:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: prod-bundle

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: selfmanaged-${{ github.ref_name }}.zip
