<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>SelfManaged – Optionen</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 460px;
        margin: 40px auto;
        color: #1f2329;
      }
      h1 {
        font-size: 18px;
      }
      label {
        display: block;
        font-size: 13px;
        margin: 16px 0 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        font-size: 14px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 8px;
      }
      button {
        margin-top: 16px;
        background: #2b8a3e;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 9px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .saved {
        color: #2b8a3e;
        font-size: 13px;
        margin-left: 10px;
      }
      p {
        font-size: 13px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <h1>SelfManaged – Verbindung</h1>
    <p>
      Adresse der SelfManaged-App. Lokal meist
      <code>http://localhost:5173</code>; bei einem Deployment die jeweilige URL.
    </p>
    <label for="appUrl">App-URL</label>
    <input id="appUrl" type="url" placeholder="http://localhost:5173" />
    <div>
      <button id="save">Speichern</button>
      <span class="saved" id="saved" hidden>Gespeichert ✓</span>
    </div>
    <script src="options.js"></script>
  </body>
</html>
