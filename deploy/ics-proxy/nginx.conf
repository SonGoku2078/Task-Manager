# Pfad-Filter vor den Task-Manager (#61).
#
# Die App hat KEINE Authentifizierung. Damit Proton Calendar den ICS-Feed
# abonnieren kann, darf deshalb niemals der Server selbst ins Internet, sondern
# nur genau diese eine Route:
#
#     GET /calendar/<token>.ics
#
# Alles andere (/, /api/*, /health, andere Methoden) beantwortet dieser Proxy
# mit 404. Der geheime Token in der URL bleibt der Zugriffsschutz — Proton kann
# sich nicht anmelden.
#
# Der NetBird-Reverse-Proxy zeigt auf DIESEN Dienst, nicht auf den Task-Manager.

server {
    listen 8080;
    server_name _;

    # Keine Server-Version preisgeben.
    server_tokens off;

    # Erlaubt: genau ein Kalender-Feed-Pfad. Der Token ist base64url
    # (crypto.randomBytes(24).toString('base64url')) -> A-Z a-z 0-9 _ -
    location ~ "^/calendar/[A-Za-z0-9_-]+\.ics$" {
        limit_except GET HEAD {
            deny all;
        }

        proxy_pass http://taskmanager:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Kalender-Clients pollen; kurze Timeouts genuegen.
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;

        # Keine Weiterleitungen des Backends nach aussen spiegeln.
        proxy_redirect off;
    }

    # Alles andere existiert nach aussen nicht.
    location / {
        return 404;
    }
}
